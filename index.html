<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Asistencia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h1>¡Confirma tu asistencia!</h1>
        <p>Por favor, llena los datos para reservar tu lugar.</p>
        
        <!-- Pega aquí tu URL de Apps Script -->
        <form action="https://script.google.com/macros/s/AKfycbwmYaLYhPVB0ya2cRB3edRHrB3jMzZvKqjAAW64jaZZSnFW2P9umehrXo_EOgoLNKfR/exec" method="POST">
            
            <label for="Nombre">Nombre Completo:</label>
            <input type="text" id="Nombre" name="Nombre" required>

            <label for="Cantidad de boletos">Cantidad de boletos (incluyéndote):</label>
            <input type="number" id="Cantidad de boletos" name="Cantidad de boletos" min="1" required>

            <button type="submit">Enviar Confirmación</button>
        </form>
    </div>
</body>
</html>
