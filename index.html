<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Asistencia</title>
    <!-- Asegúrate de tener tu archivo style.css en el mismo repositorio -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="formulario-asistencia" action="https://script.google.com/macros/s/AKfycbwmYaLYhPVB0ya2cRB3edRHrB3jMzZvKqjAAW64jaZZSnFW2P9umehrXo_EOgoLNKfR/exec" method="POST">
        <h2>¡Confirma tu asistencia a la fiesta de Alberto!</h2>
        
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="adultos">Cantidad de boletos de adultos (incluyéndote):</label>
        <input type="number" id="adultos" name="adultos" min="0" value="0" required>

        <label for="ninos">Cantidad de boletos de niños (Menú infantil):</label>
        <input type="number" id="ninos" name="ninos" min="0" value="0" required>

        <button type="submit">Enviar Confirmación</button>
    </form>

</body>
</html>
