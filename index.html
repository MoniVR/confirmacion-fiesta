<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Asistencia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="formulario-asistencia">
        <h2>¡Confirma tu asistencia a la fiesta de Alberto!</h2>
        
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="adultos">Cantidad de boletos de adultos (incluyéndote):</label>
        <input type="number" id="adultos" name="adultos" min="0" value="0" required>

        <label for="ninos">Cantidad de boletos de niños (Menú infantil):</label>
        <input type="number" id="ninos" name="ninos" min="0" value="0" required>

        <button type="submit" id="btn-enviar">Enviar Confirmación</button>
    </form>

    <div id="mensaje" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        const form = document.getElementById('formulario-asistencia');
        const mensaje = document.getElementById('mensaje');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            mensaje.innerText = "Enviando...";
            
            const formData = new FormData(form);
            
            fetch("https://script.google.com/macros/s/AKfycbzvPwunIMjyoKaivq5zDRgO-GjmlgsUR1UHLgLGFJdPAw_KntGzAc_PcOHckUS7ESwK/exec", {
                method: "POST",
                body: formData
            })
            .then(res => res.text())
            .then(data => {
                mensaje.innerText = "¡Gracias! Datos recibidos correctamente.";
                form.reset();
            })
            .catch(error => {
                mensaje.innerText = "Error al enviar: " + error;
            });
        });
    </script>
</body>
</html>
